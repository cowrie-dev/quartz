name: "Notify research repo of upstream change"

# Fires a repository_dispatch into cowrie-dev/research whenever this fork's
# `main` branch advances (cowrie-specific theme/config lives there;
# `v4` keeps tracking upstream jackyzha0/quartz).  Requires a fine-grained PAT
# (or GitHub App token) stored as the RESEARCH_DISPATCH_TOKEN secret with
# `contents: write` on cowrie-dev/research.  If the secret is missing this
# workflow no-ops gracefully.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: notify-research
  cancel-in-progress: true

jobs:
  dispatch:
    name: repository_dispatch cowrie-dev/research
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'cowrie-dev/quartz' }}
    steps:
      - name: Send dispatch
        env:
          DISPATCH_TOKEN: ${{ secrets.RESEARCH_DISPATCH_TOKEN }}
          QUARTZ_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "RESEARCH_DISPATCH_TOKEN not set; skipping dispatch."
            exit 0
          fi
          payload=$(jq -n --arg sha "${QUARTZ_SHA}" \
            '{event_type: "quartz-upstream-changed", client_payload: {sha: $sha}}')
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/cowrie-dev/research/dispatches \
            -d "${payload}"
          echo "Dispatched quartz-upstream-changed (sha=${QUARTZ_SHA})"
